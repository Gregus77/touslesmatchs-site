server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /preuves/ {
        alias /usr/share/nginx/html/preuves/;
    }

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets
    location ~* \.(css|js|png|ico|jpg|svg)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
