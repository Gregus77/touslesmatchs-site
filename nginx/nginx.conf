server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /preuves/ {
        alias /usr/share/nginx/html/preuves/;
    }

    # Stripe webhook → service stripe-webhook:4242
    location /stripe/webhook {
        proxy_pass         http://stripe-webhook:4242/stripe/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_read_timeout 30s;
    }

    # Health check
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Cache static assets
    location ~* \.(css|js|png|ico|jpg|svg)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
