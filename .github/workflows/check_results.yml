name: Hermès — Check Results

on:
  schedule:
    - cron: '0 */4 * * *'   # Toutes les 4h UTC (6h, 10h, 14h, 18h, 22h Paris)
  workflow_dispatch:          # Lancement manuel possible

jobs:
  check-results:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Hermès Check Results
        env:
          GITHUB_TOKEN:        ${{ secrets.HERMES_GITHUB_TOKEN }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          FOOTBALL_DATA_KEY:   ${{ secrets.FOOTBALL_DATA_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/check_results.js

      - name: Deploy via SSH si résultat trouvé
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/touslesmatchs
            git pull origin main
            docker compose up --build -d --remove-orphans
            docker image prune -f
