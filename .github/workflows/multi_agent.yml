name: Pick du Jour Multi-Agents

on:
  schedule:
    # Tous les jours à 9h30 heure de Paris (7h30 UTC)
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  generate-pick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HERMES_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git identity
        run: |
          git config user.name "Hermès Bot"
          git config user.email "hermes@touslesmatchs.com"

      - name: Run Multi-Agents Concile V5
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          GITHUB_TOKEN:       ${{ secrets.HERMES_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/multi_agent.js

      - name: Sync clés API vers VPS (hermes.env)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30s
          envs: GROQ_API_KEY,GEMINI_API_KEY,DEEPSEEK_API_KEY,ANTHROPIC_API_KEY,FOOTBALL_DATA_KEY
          script: |
            cat > /root/hermes.env << ENVEOF
            GROQ_API_KEY=$GROQ_API_KEY
            GEMINI_API_KEY=$GEMINI_API_KEY
            DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
            ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
            FOOTBALL_DATA_KEY=$FOOTBALL_DATA_KEY
            ENVEOF
            chmod 600 /root/hermes.env
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALL_DATA_KEY:  ${{ secrets.FOOTBALL_DATA_KEY }}

      - name: Deploy site via SSH
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 120s
          script: |
            cd /opt/touslesmatchs
            git pull origin main
            docker compose up --build -d --remove-orphans
            docker image prune -f
