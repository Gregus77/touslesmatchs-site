name: Pick du Jour Multi-Agents

on:
  schedule:
    # Tous les jours à 9h30 heure de Paris (7h30 UTC)
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  generate-pick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Multi-Agents Concile V4.2
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.HERMES_GITHUB_TOKEN }}
        run: node scripts/multi_agent.js

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/touslesmatchs
            git pull origin main
            docker compose up --build -d --remove-orphans
            docker image prune -f

