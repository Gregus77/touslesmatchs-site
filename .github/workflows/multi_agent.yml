name: Pick du Jour Multi-Agents

on:
  schedule:
    # Tous les jours à 9h30 heure de Paris (7h30 UTC)
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  generate-pick:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HERMES_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git identity
        run: |
          git config user.name "Hermès Bot"
          git config user.email "hermes@touslesmatchs.com"

      - name: Install dependencies
        run: npm install

      - name: Run Hermès V2 — Génération picks
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          RAPIDAPI_KEY:       ${{ secrets.RAPIDAPI_KEY }}
          GITHUB_TOKEN:       ${{ secrets.HERMES_GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/multi_agent.js

      - name: Antithèse — Audit qualité (détection bugs)
        continue-on-error: true
        run: node scripts/antithese_audit.js

      - name: Build React app
        env:
          CI: false
        run: npm run build

      - name: Commit picks + build
        run: |
          git add src/App.js
          git diff --staged --quiet || git commit -m "🤖 Hermès $(date +'%d/%m'): picks mis à jour"
          git push origin main || true

      - name: Deploy vers VPS via SSH
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 120s
          script: |
            cd /opt/touslesmatchs
            git fetch origin main
            git reset --hard origin/main
            docker compose up --build -d --remove-orphans
            docker image prune -f
