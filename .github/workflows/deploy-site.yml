name: Deploy Site (React) vers VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - 'Caddyfile'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy React site via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /opt/touslesmatchs
            git pull origin main
            docker compose up --build -d site
            docker image prune -f
            echo "✅ Site React redéployé avec succès"
