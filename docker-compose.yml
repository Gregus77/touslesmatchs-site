services:
  site:
    build: .
    container_name: touslesmatchs-site
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: touslesmatchs-api
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FOOTBALL_DATA_KEY=${FOOTBALL_DATA_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PRICE_ID_PREMIUM=${STRIPE_PRICE_ID_PREMIUM}
      - STRIPE_PRICE_ID_VIP=${STRIPE_PRICE_ID_VIP}
      - STRIPE_PRICE_ID_ELITE=${STRIPE_PRICE_ID_ELITE}
    networks:
      - web
    expose:
      - "3001"

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: touslesmatchs-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - web

  hermes-admin:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: touslesmatchs-hermes-admin
    restart: unless-stopped
    command: node scripts/hermes_admin_bot.js
    environment:
      - TELEGRAM_ADMIN_BOT_TOKEN=${TELEGRAM_ADMIN_BOT_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_ADMIN_BOT_TOKEN}
      - TELEGRAM_ADMIN_ID=${TELEGRAM_ADMIN_ID}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - USERS_DB_PATH=./scripts/users_db.json
    volumes:
      - ./scripts:/app/scripts
      - ./src:/app/src
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
