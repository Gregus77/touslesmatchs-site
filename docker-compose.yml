services:

  # ── Site React + Caddy (HTTPS Let's Encrypt) ───────────────
  site:
    build:
      context: .
      dockerfile: Dockerfile
    image: touslesmatchs-site
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - hermes_net

  # ── API backend (analyse live) ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: touslesmatchs-api
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Paris
    networks:
      - hermes_net

  # ── Bot Telegram Free (interactif) ─────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    image: touslesmatchs-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./scripts:/app/scripts
      - ./src/App.js:/app/scripts/App.js:ro
    networks:
      - hermes_net

  # ── Hermès Admin Bot ───────────────────────────────────────
  hermes-admin:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: touslesmatchs-hermes-admin
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Paris
    networks:
      - hermes_net

  # ── Webhook Stripe (accès Premium auto + expulsions) ───────
  stripe-webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    image: touslesmatchs-stripe-webhook
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./scripts:/app/scripts
    networks:
      - hermes_net

volumes:
  caddy_data:
  caddy_config:

networks:
  hermes_net:
    driver: bridge
